      {
        "imports": {
          "preact": "./vendor/preact.module.js",
          "preact/hooks": "./vendor/preact-hooks.module.js",

        }
      }

  <body>
    <!-- Preact rendert in diesen Light-DOM-Knoten → globale Primitive/Tokens greifen -->
