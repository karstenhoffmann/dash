name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guardrails:
    name: Lint + Format (Frontend-Guardrails)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: stylelint (Token-Disziplin — rot bei Magic-Number/Nicht-Token)
        run: npm run lint
      - name: prettier (Format-Check)
        run: npm run format:check

  backend:
    name: Backend — Tests + Boot/Routen-Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install server deps (inkl. Test)
        run: pip install -r server/requirements-dev.txt
      - name: pytest (Adapter-Mapping, hardware-frei)
        run: python -m pytest -q
      - name: Smoke (App importierbar, Routen registriert)
        run: python -m server.smoke
